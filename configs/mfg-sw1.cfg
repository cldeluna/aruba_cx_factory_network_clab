! =============================================================================
! mfg-sw1 — Aruba 6300M CX — Manufacturing Access Switch 1
! =============================================================================
! VLANs: 20 (Mfg Systems), 30 (Mfg General), 40 (Building Automation),
!        50 (Digital Signage), 60 (Cameras), 70 (Machine Vision),
!        99 (Management)
!
! Uplinks: 1/1/1 → core1, 1/1/2 → core2  (LAG 1, LACP)
! Access:  1/1/3–1/1/12 example ports
! =============================================================================
hostname mfg-sw1
!
vlan 1,20,30,40,50,60,70,99
!
vlan 20
    name Mfg-Systems
vlan 30
    name Mfg-General
vlan 40
    name Building-Automation
vlan 50
    name Digital-Signage
vlan 60
    name Cameras
vlan 70
    name Machine-Vision
vlan 99
    name Management
!
spanning-tree mode mstp
spanning-tree
spanning-tree priority 7
!
! ----- Uplink LAG to Arista MLAG Core -----
interface lag 1
    no shutdown
    description uplink-to-mlag-core
    no routing
    vlan trunk native 1
    vlan trunk allowed 20,30,40,50,60,70,99
    lacp mode active
!
interface 1/1/1
    no shutdown
    description core1-Ethernet5
    lag 1
!
interface 1/1/2
    no shutdown
    description core2-Ethernet5
    lag 1
!
! ----- Access Ports: Mfg Systems — Torque Wrenches, Controllers (VLAN 20) -----
interface 1/1/3
    no shutdown
    no routing
    description torque-wrench-station-1
    vlan access 20
!
interface 1/1/4
    no shutdown
    no routing
    description torque-wrench-station-2
    vlan access 20
!
interface 1/1/5
    no shutdown
    no routing
    description plc-controller
    vlan access 20
!
! ----- Access Ports: Mfg General (VLAN 30) -----
interface 1/1/6
    no shutdown
    no routing
    description mfg-workstation
    vlan access 30
!
interface 1/1/7
    no shutdown
    no routing
    description mfg-printer
    vlan access 30
!
! ----- Access Ports: Machine Vision (VLAN 70) -----
interface 1/1/8
    no shutdown
    no routing
    description vision-camera-line1
    vlan access 70
!
interface 1/1/9
    no shutdown
    no routing
    description vision-camera-line2
    vlan access 70
!
! ----- Access Ports: Cameras (VLAN 60) -----
interface 1/1/10
    no shutdown
    no routing
    description security-camera
    vlan access 60
!
! ----- Access Ports: Building Automation (VLAN 40) -----
interface 1/1/11
    no shutdown
    no routing
    description hvac-controller
    vlan access 40
!
! ----- Access Ports: Digital Signage (VLAN 50) -----
interface 1/1/12
    no shutdown
    no routing
    description production-display
    vlan access 50
!
! ----- Management SVI -----
interface vlan 99
    description Management
    ip address 10.10.99.21/24
!
ip route 0.0.0.0/0 10.10.99.1
!
