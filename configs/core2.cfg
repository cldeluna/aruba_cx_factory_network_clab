! =============================================================================
! core2 — Arista cEOS — MLAG Secondary
! =============================================================================
hostname core2
!
! ----- Spanning Tree -----
spanning-tree mode mstp
spanning-tree mst 0 priority 8192
no spanning-tree vlan-id 4094
!
! ----- VLANs -----
vlan 10
   name Laptops-Desktops
!
vlan 20
   name Mfg-Systems
!
vlan 30
   name Mfg-General
!
vlan 40
   name Building-Automation
!
vlan 50
   name Digital-Signage
!
vlan 60
   name Cameras
!
vlan 70
   name Machine-Vision
!
vlan 99
   name Management
!
vlan 4094
   name MLAG-Peer
   trunk group MLAGPEER
!
! ----- VARP Virtual MAC (must match core1) -----
ip virtual-router mac-address 00:1c:73:00:dc:01
!
! ----- MLAG Peer Link (Port-Channel1 = Ethernet1 + Ethernet2) -----
interface Port-Channel1
   description MLAG-PEER-LINK
   switchport mode trunk
   switchport trunk group MLAGPEER
!
interface Ethernet1
   description mlag-peer-link-member
   channel-group 1 mode active
!
interface Ethernet2
   description mlag-peer-link-member
   channel-group 1 mode active
!
! ----- MLAG Domain -----
interface Vlan4094
   description MLAG-Peer-SVI
   no autostate
   ip address 10.10.251.2/30
!
mlag configuration
   domain-id FACTORY-MLAG
   local-interface Vlan4094
   peer-address 10.10.251.1
   peer-link Port-Channel1
   reload-delay mlag 300
   reload-delay non-mlag 330
!
! ===================== MLAG Downlinks to Access Switches =====================
!
! ----- office-sw1 (MLAG 10) -----
interface Port-Channel10
   description office-sw1-MLAG
   switchport mode trunk
   switchport trunk allowed vlan 10,40,50,60,99
   mlag 10
!
interface Ethernet3
   description office-sw1-uplink
   channel-group 10 mode active
!
! ----- office-sw2 (MLAG 20) -----
interface Port-Channel20
   description office-sw2-MLAG
   switchport mode trunk
   switchport trunk allowed vlan 10,40,50,60,99
   mlag 20
!
interface Ethernet4
   description office-sw2-uplink
   channel-group 20 mode active
!
! ----- mfg-sw1 (MLAG 30) -----
interface Port-Channel30
   description mfg-sw1-MLAG
   switchport mode trunk
   switchport trunk allowed vlan 20,30,40,50,60,70,99
   mlag 30
!
interface Ethernet5
   description mfg-sw1-uplink
   channel-group 30 mode active
!
! ----- mfg-sw2 (MLAG 40) -----
interface Port-Channel40
   description mfg-sw2-MLAG
   switchport mode trunk
   switchport trunk allowed vlan 20,30,40,50,60,70,99
   mlag 40
!
interface Ethernet6
   description mfg-sw2-uplink
   channel-group 40 mode active
!
! ----- mfg-sw3 (MLAG 50) -----
interface Port-Channel50
   description mfg-sw3-MLAG
   switchport mode trunk
   switchport trunk allowed vlan 20,30,40,50,60,70,99
   mlag 50
!
interface Ethernet7
   description mfg-sw3-uplink
   channel-group 50 mode active
!
! ===================== L3 Gateway SVIs (VARP) =====================
!
interface Vlan10
   description Laptops-Desktops-GW
   ip address 192.0.2.3/24
   ip virtual-router address 192.0.2.1
!
interface Vlan20
   description Mfg-Systems-GW
   ip address 10.10.20.3/24
   ip virtual-router address 10.10.20.1
!
interface Vlan30
   description Mfg-General-GW
   ip address 10.10.30.3/24
   ip virtual-router address 10.10.30.1
!
interface Vlan40
   description Building-Automation-GW
   ip address 203.0.113.3/24
   ip virtual-router address 203.0.113.1
!
interface Vlan50
   description Digital-Signage-GW
   ip address 198.51.100.3/24
   ip virtual-router address 198.51.100.1
!
interface Vlan60
   description Cameras-GW
   ip address 10.10.60.3/24
   ip virtual-router address 10.10.60.1
!
interface Vlan70
   description Machine-Vision-GW
   ip address 10.10.70.3/24
   ip virtual-router address 10.10.70.1
!
interface Vlan99
   description Management-GW
   ip address 10.10.99.3/24
   ip virtual-router address 10.10.99.1
!
! ----- Routing -----
ip routing
!
end
