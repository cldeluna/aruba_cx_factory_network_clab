! =============================================================================
! office-sw1 — Aruba 6300M CX — Office Access Switch 1
! =============================================================================
! VLANs: 10 (Laptops/Desktops), 40 (Building Automation),
!        50 (Digital Signage), 60 (Cameras), 99 (Management)
!
! Uplinks: 1/1/1 → core1, 1/1/2 → core2  (LAG 1, LACP)
! Access:  1/1/3–1/1/10 example ports
! =============================================================================
hostname office-sw1
!
vlan 1,10,40,50,60,99
!
vlan 10
    name Laptops-Desktops
vlan 40
    name Building-Automation
vlan 50
    name Digital-Signage
vlan 60
    name Cameras
vlan 99
    name Management
!
spanning-tree mode mstp
spanning-tree
spanning-tree priority 7
!
! ----- Uplink LAG to Arista MLAG Core -----
interface lag 1
    no shutdown
    description uplink-to-mlag-core
    no routing
    vlan trunk native 1
    vlan trunk allowed 10,40,50,60,99
    lacp mode active
!
interface 1/1/1
    no shutdown
    description core1-Ethernet3
    lag 1
!
interface 1/1/2
    no shutdown
    description core2-Ethernet3
    lag 1
!
! ----- Access Ports: Laptops & Desktops (VLAN 10) -----
interface 1/1/3
    no shutdown
    no routing
    description user-port
    vlan access 10
!
interface 1/1/4
    no shutdown
    no routing
    description user-port
    vlan access 10
!
interface 1/1/5
    no shutdown
    no routing
    description user-port
    vlan access 10
!
interface 1/1/6
    no shutdown
    no routing
    description user-port
    vlan access 10
!
! ----- Access Ports: Digital Signage (VLAN 50) -----
interface 1/1/7
    no shutdown
    no routing
    description signage-display
    vlan access 50
!
! ----- Access Ports: Cameras (VLAN 60) -----
interface 1/1/8
    no shutdown
    no routing
    description camera-port
    vlan access 60
!
! ----- Access Ports: Building Automation (VLAN 40) -----
interface 1/1/9
    no shutdown
    no routing
    description bms-sensor
    vlan access 40
!
interface 1/1/10
    no shutdown
    no routing
    description bms-controller
    vlan access 40
!
! ----- Management SVI -----
interface vlan 99
    description Management
    ip address 10.10.99.11/24
!
ip route 0.0.0.0/0 10.10.99.1
!
